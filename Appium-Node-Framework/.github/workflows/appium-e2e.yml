name: Appium Node.js E2E Automation

on:
  push:
    branches: [ main ]
    paths:
      - 'Appium-Node-Framework/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'Appium-Node-Framework/**'
  workflow_dispatch:

jobs:
  mobile-e2e-tests:
    runs-on: macos-latest
    
    defaults:
      run:
        working-directory: ./Appium-Node-Framework

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: './Appium-Node-Framework/package-lock.json'

    - name: Install Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install npm dependencies
      run: npm ci

    - name: Install Appium globally
      run: npm install -g appium

    - name: Install Appium UiAutomator2 Driver
      run: appium driver install uiautomator2

    - name: Start Appium Server
      run: appium --log-level error &
      
    - name: Run Android Emulator and Execute Tests
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: 30
        target: google_apis
        arch: x86_64
        profile: pixel_5
        script: cd Appium-Node-Framework && npm test
        
    - name: Generate Excel Report
      if: always()
      run: npm run report:excel
        
    - name: Upload Test Reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: Appium-Test-Reports
        path: |
          ./Appium-Node-Framework/reports/
          ./Appium-Node-Framework/excel/
          ./Appium-Node-Framework/logs/
          ./Appium-Node-Framework/screenshots/
